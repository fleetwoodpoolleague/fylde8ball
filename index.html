<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Fylde 8 Ball</title>
    <meta name="theme-color" content="#f4f6f2" />
    <!-- Anti-FOUC: set theme before first paint. Keep key/colours in sync with src/composables/useTheme.ts -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('f8b-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.dataset.theme = t
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.content = t === 'dark' ? '#111814' : '#f4f6f2'
        } catch (e) {}
      })()
    </script>
    <meta property="og:site_name" content="Fylde 8 Ball" />
    <meta name="geo.region" content="GB-LAN" />
    <meta name="geo.placename" content="Fylde Coast" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Fylde 8 Ball",
      "url": "https://fylde8ball.co.uk",
      "description": "Home of pool on the Fylde Coast. Tournaments, leagues and events across Blackpool and Poulton-le-Fylde."
    }
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VRYR7VK839"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VRYR7VK839');
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
