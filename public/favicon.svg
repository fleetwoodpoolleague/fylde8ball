<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Deep black ball base -->
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="65%" fx="38%" fy="32%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="35%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- White circle gradient for depth -->
    <radialGradient id="circleGrad" cx="40%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>

    <!-- Primary specular highlight -->
    <radialGradient id="shineGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft ambient glow at base -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="dropShadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Soft inner glow on white circle -->
    <filter id="circleGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="ballClip">
      <circle cx="50" cy="50" r="47"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="50" cy="96" rx="34" ry="5" fill="#000000" opacity="0.35"/>

  <!-- Main ball -->
  <circle cx="50" cy="50" r="47" fill="url(#ballGrad)" filter="url(#dropShadow)"/>

  <!-- Edge darkening for roundness -->
  <circle cx="50" cy="50" r="47" fill="url(#shadowGrad)" clip-path="url(#ballClip)"/>

  <!-- White circle -->
  <circle cx="50" cy="51" r="18" fill="url(#circleGrad)" filter="url(#circleGlow)"/>

  <!-- Subtle shadow arc on white circle bottom -->
  <ellipse cx="50" cy="63" rx="14" ry="4" fill="#c8c8c8" opacity="0.4" clip-path="url(#ballClip)"/>

  <!-- The 8 numeral -->
  <text
    x="50"
    y="57.5"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="700"
    fill="#111111"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-0.5"
  >8</text>

  <!-- Primary highlight — large soft -->
  <ellipse cx="33" cy="26" rx="14" ry="9" fill="url(#shineGrad)" opacity="0.55" clip-path="url(#ballClip)" transform="rotate(-20, 33, 26)"/>

  <!-- Secondary specular — small sharp -->
  <ellipse cx="30" cy="22" rx="5" ry="3" fill="#ffffff" opacity="0.75" clip-path="url(#ballClip)" transform="rotate(-15, 30, 22)"/>

  <!-- Tiny catchlight -->
  <circle cx="27" cy="19" r="1.5" fill="#ffffff" opacity="0.95" clip-path="url(#ballClip)"/>
</svg>
